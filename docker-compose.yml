services:
  backend:
    build:
      context: ./MyFlix
    container_name: myflix-api
    ports:
      - "5152:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development


  frontend:
    build:
      context: ./frontend
    container_name: myflix-web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080/api
    depends_on:
      - backend